# local_arb — arbitragem local USDT/BRL entre exchanges brasileiras (RESEARCH / PAPER ONLY)
# Taxas são MANUAIS e editáveis — conferir nos sites das exchanges antes de confiar.

engine_role: local_arb_research

pair:
  base: USDT
  quote: BRL
  symbol: USDT/BRL

# Blocos `api:` = endpoints REST PÚBLICOS de order book (sem credenciais, read-only).
# Formato do bloco documentado em adapters.py (PublicRestAdapter). Fonte que falhar
# vira erro controlado + quality flag — nunca crash. `api: null` = sem endpoint
# (adapter falha controlado com flag no_endpoint).
exchanges:
  mercadobitcoin:
    display_name: "Mercado Bitcoin"
    enabled: true
    # bps = basis points (1 bp = 0.01%)
    taker_bps: 70        # 0.70% — não confirmado por API pública; manter conservador
    maker_bps: 30        # 0.30% — não confirmado por API pública; maker não usado no gate
    withdrawal_brl_fixed: 0.0
    withdrawal_usdt_fixed: 1.0
    synthetic: {bid: 5.655, ask: 5.660, latency_ms: 200.0}
    api:                 # API v4 pública
      url: "https://api.mercadobitcoin.net/api/v4/USDT-BRL/orderbook"
      data_path: []
      bids_key: bids
      asks_key: asks
      level_format: pair   # [["5.60","100"], ...]
      timeout_s: 5

  # NovaDAX: docs ainda apontam para api.novadax.com, mas DNS do host público
  # não resolve em 2026-07-08. Mantida como candidato, desabilitada para não
  # contaminar coleta real até aparecer endpoint público funcional.
  novadax:
    display_name: "NovaDAX"
    enabled: false
    taker_bps: 50        # 0.50% (placeholder manual)
    maker_bps: 25
    withdrawal_brl_fixed: 0.0
    withdrawal_usdt_fixed: 1.0
    api:
      url: "https://api.novadax.com/v1/market/depth?symbol=USDT_BRL&limit=20"
      data_path: [data]
      bids_key: bids
      asks_key: asks
      level_format: pair
      timeout_s: 5

  bitypreco:
    display_name: "Bitypreço"
    enabled: true
    taker_bps: 50        # 0.50% — não confirmado por API pública; manter conservador
    maker_bps: 0         # maker não usado no gate; API pública não expôs fee schedule
    withdrawal_brl_fixed: 0.0
    withdrawal_usdt_fixed: 1.0
    api:
      url: "https://api.bitpreco.com/usdt-brl/orderbook"
      data_path: []
      bids_key: bids
      asks_key: asks
      level_format: obj    # [{"price": 5.60, "amount": 100}, ...]
      price_key: price
      size_key: amount
      timeout_s: 5

  binance:
    display_name: "Binance"
    enabled: true
    taker_bps: 7.5       # taxa efetiva da conta confirmada em 14/07/2026
    maker_bps: 7.5
    withdrawal_brl_fixed: 0.0
    withdrawal_usdt_fixed: 0.01  # BSC/BEP20; Bybit confirmou suporte ao depósito
    synthetic: {bid: 5.560, ask: 5.565, latency_ms: 120.0}
    api:
      url: "https://api.binance.com/api/v3/depth?symbol=USDTBRL&limit=20"
      data_path: []
      bids_key: bids
      asks_key: asks
      level_format: pair
      timeout_s: 5

  bybit:
    display_name: "Bybit"
    enabled: true
    taker_bps: 55        # taxa fiat USDT/BRL efetiva da conta (14/07/2026)
    maker_bps: 25        # taxa fiat USDT/BRL efetiva da conta (14/07/2026)
    withdrawal_brl_fixed: 0.0  # PIX confirmado zero-fee
    withdrawal_usdt_fixed: 1.0
    synthetic: {bid: 5.561, ask: 5.566, latency_ms: 140.0}
    api:
      url: "https://api.bybit.com/v5/market/orderbook?category=spot&symbol=USDTBRL&limit=20"
      data_path: [result]
      bids_key: b
      asks_key: a
      level_format: pair
      timeout_s: 5

  foxbit:
    display_name: "Foxbit"
    enabled: true
    taker_bps: 50        # default público retornado no market metadata: 0.50%
    maker_bps: 25
    withdrawal_brl_fixed: 0.0
    withdrawal_usdt_fixed: 1.0
    api:
      url: "https://api.foxbit.com.br/rest/v3/markets/USDTBRL/orderbook?depth=20"
      data_path: []
      bids_key: bids
      asks_key: asks
      level_format: pair
      timeout_s: 5

  bitso:
    display_name: "Bitso"
    enabled: true
    taker_bps: 40        # flat_rate público API available_books para usdt_brl: 0.40%
    maker_bps: 20        # flat_rate público API available_books para usdt_brl: 0.20%
    withdrawal_brl_fixed: 0.0
    withdrawal_usdt_fixed: 1.0
    api:
      url: "https://api.bitso.com/v3/order_book/?book=usdt_brl&aggregate=true"
      data_path: [payload]
      bids_key: bids
      asks_key: asks
      level_format: obj
      price_key: price
      size_key: amount
      timeout_s: 5

  brasilbitcoin:
    display_name: "Brasil Bitcoin"
    enabled: true
    taker_bps: 50        # página pública: ordem ativa até R$250k = 0.50%
    maker_bps: 20        # página pública: ordem passiva até R$250k = 0.20%
    withdrawal_brl_fixed: 0.0
    withdrawal_usdt_fixed: 1.0
    api:
      url: "https://brasilbitcoin.com.br/API/orderbook/USDT"
      data_path: []
      bids_key: buy
      asks_key: sell
      level_format: obj
      price_key: preco
      size_key: quantidade
      timeout_s: 5

  okx:
    display_name: "OKX"
    enabled: true
    taker_bps: 10        # fee page pública regular user: spot taker 0.10%
    maker_bps: 8         # fee page pública regular user: spot maker 0.08%
    withdrawal_brl_fixed: 0.0
    withdrawal_usdt_fixed: 1.0
    api:
      url: "https://www.okx.com/api/v5/market/books?instId=USDT-BRL&sz=20"
      data_path: [data, 0]
      bids_key: bids
      asks_key: asks
      level_format: pair
      timeout_s: 5

# Componentes extras do break-even (todos em bps, editáveis)
break_even:
  slippage_est_bps: 5.0          # slippage estimado além do book visível
  latency_haircut_bps: 3.0       # decay esperado entre detecção e execução
  rebalance_amortized_bps: 8.0   # custo médio de rebalanceamento / capital preso
  fee_uncertainty_bps: 10.0      # buffer residual para fontes não confirmadas/tier/saques

thresholds:
  min_net_bps: 20.0        # só é oportunidade se net (gross - break_even) >= isto
  min_quality_score: 70    # score mínimo dos DOIS books para considerar
  max_book_age_s: 10.0     # snapshot mais velho que isto é stale

observer:
  enabled: true
  poll_seconds: 10
  jitter_seconds: 2
  candidate_min_net_bps: -20.0
  watch_min_net_bps: 0.0
  execution_min_net_bps: 20.0
  max_skew_ms: 2000
  persist_all_snapshots: false
  persist_candidate_windows: true
  persist_rejections: true
  # PRD §18 — decisão da tese só na agregação multi-dia; dia isolado nunca mata.
  min_valid_observations_per_day: 500   # piso p/ o dia contar na decisão terminal
  min_days_for_decision: 7              # ADVANCE/KILL só após >= isto dias válidos
  lifecycle_max_gap_seconds: 30.0       # gap acima disto segmenta o ciclo de vida
  lifecycle_min_duration_seconds: 3.0   # ciclos mais curtos = ruído, descartados
  advance_gates:                        # totais na janela de dias válidos p/ ADVANCE
    positive: 30                        # janelas com net > 0
    above_10: 10                        # janelas com net >= 10 bps
    above_20: 3                         # janelas com net >= 20 bps

simulation:
  sizes_quote_brl: [500, 1000, 2500, 5000]   # tamanhos simulados por rodada
  level_participation: 0.5                    # assume capturar só 50% do size exibido por nível
  min_fill_ratio: 0.95                        # fill mínimo aceito no paper (95%)

paper:
  delay_ms: 750            # atraso simulado entre sinal e "execução" paper
  initial_balances:
    brl_per_exchange: 10000.0
    usdt_per_exchange: 2000.0

quality:
  min_levels: 5
  stale_penalty: 40
  thin_book_penalty: 20
  crossed_penalty: 30
  high_latency_penalty: 10
  max_latency_ms: 1500

report:
  min_trades_for_verdict: 20   # abaixo disto -> HOLD
  viva_min_net_bps: 10.0       # média realizada >= isto -> VIVA
  ferida_max_decay_bps: 15.0   # decay médio acima disto fere a tese

# Fase 3.3 — simulador inventory-aware OFFLINE (lê CSVs do observer, só gera md).
# Cenários de inventário pré-posicionado; balances explícito vence default_brl/usdt.
inventory_aware:
  min_net_bps: 0.0               # elegível se net_eff = net + crédito >= isto
  rebalance_credit_bps: null     # null = usa break_even.rebalance_amortized_bps
  reference_price_brl: 5.60      # só p/ conversão de inventário BRL<->USDT, não PnL
  drain_threshold_pct: 0.10      # saldo final < 10% do inicial = venue drenada
  decision:
    min_valid_windows: 500       # abaixo disto no dia -> NEED_MORE_DATA
    min_days_for_decision: 7     # PRD §18: decidir só após 7-14 dias
    advance_min_executable: 10   # ADVANCE exige >= isto no melhor cenário
    blocked_max_share: 0.5       # ADVANCE exige <= 50% bloqueadas por inventário
  scenarios:
    # capital igual em todas as venues habilitadas
    balanced_all_venues:
      default_brl: 2000.0
      default_usdt: 400.0
    # só as 4 venues com mais volume/liquidez observada
    top_venues:
      venues: [binance, mercadobitcoin, okx, bitso]
      default_brl: 4000.0
      default_usdt: 800.0
    # capital mínimo realista de teste
    low_capital:
      default_brl: 500.0
      default_usdt: 100.0
    # tese direcional: BRL parado nas locais, USDT parado nas globais
    # (executa só rotas local->global; global->local fica blocked_by_inventory)
    brl_local_usdt_global:
      balances:
        mercadobitcoin: {BRL: 5000.0, USDT: 0.0}
        bitypreco: {BRL: 5000.0, USDT: 0.0}
        foxbit: {BRL: 5000.0, USDT: 0.0}
        brasilbitcoin: {BRL: 5000.0, USDT: 0.0}
        binance: {BRL: 0.0, USDT: 1000.0}
        bybit: {BRL: 0.0, USDT: 1000.0}
        okx: {BRL: 0.0, USDT: 1000.0}
        bitso: {BRL: 0.0, USDT: 1000.0}

# Basis Observer (13/07/2026) — prêmio Bybit×Binance USDT/BRL como reversão à média.
# Motivação: 5 dias de observer provaram que taker-taker cross-venue não paga o
# rebalanceamento; a única anomalia recorrente é o book da Bybit cotar rico em
# episódios (fluxo onramp varejo BR, pior 22h-08h UTC). Tese viável = round-trip
# INTRA-Bybit (sem mover fiat), hedge opcional na Binance. SIGNAL_ONLY.
basis_observer:
  enabled: true
  rich_exchange: bybit       # venue que cota rico (vende-se USDT aqui)
  ref_exchange: binance      # referência de mid
  min_quality_score: 70
  max_skew_ms: 2000
  episode_bps: 20.0          # descritivo: prêmio que define "episódio"
  episode_max_gap_s: 600.0   # prêmio é ciclo LENTO (dias); gaps de poll não segmentam
  episode_min_duration_s: 60.0
  # Backfill 13/07 (5 dias): prêmio NÃO oscila intraday — é um NÍVEL que cicla em
  # dias (09/07 ~0 → 12/07 ~+49bps → 13/07 ~0). Round-trip intradiário deu negativo
  # no grid inteiro; o paper live testa a tese multi-dia (hold de até 5 dias).
  paper:
    entry_bps: 30.0          # vende na Bybit quando sell_premium >= isto
    exit_bps: 5.0            # recompra quando buyback_premium <= isto
    max_hold_s: 432000       # 5 dias; estoura -> saída timeout a mercado
    cooldown_s: 3600
  # Cross-venue paper (13/07/2026): Eduardo CONFIRMOU PIX zero-fee in/out na conta
  # Bybit dele (limites: min R$50 / máx R$95.000 por dia) → o loop cross-venue
  # fecha por ~custo de taker + transfer de USDT. Teto fiat de R$95k/dia limita o
  # notional reciclável por dia; alerta de janela = basis_alert_watcher (Ariadne).
  # Com inventário nos 2 lados as pernas executam no instante do prêmio (colhe o
  # NÍVEL, sem esperar reversão); cooldown = tempo de rebalanceamento do ciclo.
  cross_paper:
    enabled: true
    # Custos reais confirmados por screenshots em 14/07/2026: Binance spot
    # maker/taker 7,5bps; Bybit USDT/BRL fiat maker 25bps / taker 55bps;
    # PIX Bybit zero; rebalance USDT Binance->Bybit por BSC custa 0,01 USDT
    # (~0,2bps num ciclo de R$2.500). Gatilho deixa ~13bps sobre o cenário
    # taker conservador de 66,7bps.
    entry_bps: 80.0
    cycle_cooldown_s: 1800
  fee_scenarios_cross:       # custo por ciclo cross (bps) aplicado nos relatórios
    taker: 66.7              # Binance 7,5 + Bybit fiat 55 + slip 4 + BSC ~0,2
    maker_bybit: 36.7        # Binance taker 7,5 + Bybit fiat maker 25 + slip 4 + BSC ~0,2
  # custo por CICLO (bps) aplicado nos relatórios sobre o bruto de reversão:
  fee_scenarios:
    taker_unhedged: 112.0    # 2x taker fiat Bybit (55) + 2 slippage
    taker_hedged: 127.0      # acima + 2x Binance spot (7,5) no hedge
    maker_bybit_hedged: 67.0 # 2x maker fiat Bybit (25) + hedge Binance 15 + slip 2

# Gold Basis Observer (13/07/2026) — clone do basis p/ ouro tokenizado PAXG↔XAUT.
# Sem arb pura (emissores distintos, sem loop de resgate no varejo); candidato é o
# basis como reversão à média. Verificado 13/07: Binance lista PAXGUSDT E XAUTUSDT
# (books ≤1bp) e Bybit lista XAUTUSDT (~0.3bp); OKX não tem. SIGNAL_ONLY.
gold_basis:
  enabled: true
  min_quality_score: 70
  max_skew_ms: 2000
  episode_bps: 10.0            # basis do ouro é mais apertado que o do BRL
  episode_max_gap_s: 600.0
  episode_min_duration_s: 60.0
  paper:
    entry_bps: 20.0
    exit_bps: 5.0
    max_hold_s: 432000         # 5 dias (amplitude/meia-vida desconhecidas — medir)
    cooldown_s: 3600
  routes:
    # pair-trade same-venue (zero rails; custo = 4 pernas taker ~40bps + slip)
    - name: xaut_paxg_binance
      rich: {venue: binance, symbol: XAUTUSDT}
      ref:  {venue: binance, symbol: PAXGUSDT}
      fee_scenarios:
        taker_4_pernas: 46.0
        maker_4_pernas: 22.0
    # mesmo token cross-venue (inventário nos 2 lados = 2 pernas, análogo ao BRL)
    - name: xaut_bybit_binance
      rich: {venue: bybit, symbol: XAUTUSDT}
      ref:  {venue: binance, symbol: XAUTUSDT}
      fee_scenarios:
        taker_2_pernas: 24.0
        maker_2_pernas: 12.0
