  #     timeout: 10s
  #     retries: 3
  #     start_period: 30s

  # ef3_fa1mf_paper: Edge Factory v3 R003 / F-A.1.M.f paper trader (BTCUSDT, $1000 / 1x)
  # 30-bar H4 CLOSE breakout + SMA200 Daily regime filter + ATR14x2.0 trailing stop.
  # Data via Binance Futures public REST klines (H4 + Daily). Long-only, isolated.
  # Stop with: docker compose stop trading-ef3-fa1mf-paper
  trading-ef3-fa1mf-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.ef3_fa1mf_paper
    container_name: trading_ef3_fa1mf_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8102:8102"
    environment:
      - FA1MF_DATA_DIR=/data
      - FA1MF_LOG_DIR=/logs
      - FA1MF_CAPITAL=1000.0
      - FA1MF_LEVERAGE=1.0
      - FA1MF_HEALTH_PORT=8102
      - TZ=UTC
    volumes:
      - ./trading/ef3_fa1mf_paper/data:/data
      - ./trading/ef3_fa1mf_paper/logs:/logs
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8102/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ef3_fb2af_paper: Edge Factory v3 R004 / F-B.2.A.f paper trader (BTCUSDT, $1000 / 1x)
  # 20-bar H4 HIGH breakout + range-compression <12% + SMA200 Daily + SL 1xATR14 + TP 8:1.
  # Data via Binance Futures public REST klines (H4 + Daily). Long-only, isolated.
  # Stop with: docker compose stop trading-ef3-fb2af-paper
  trading-ef3-fb2af-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.ef3_fb2af_paper
    container_name: trading_ef3_fb2af_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8103:8103"
    environment:
      - FB2AF_DATA_DIR=/data
      - FB2AF_LOG_DIR=/logs
      - FB2AF_CAPITAL=1000.0
      - FB2AF_LEVERAGE=1.0
      - FB2AF_HEALTH_PORT=8103
      - TZ=UTC
    volumes:
      - ./trading/ef3_fb2af_paper/data:/data
      - ./trading/ef3_fb2af_paper/logs:/logs
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8103/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # rsi_reversion_paper: R021-A C1 RSI Extreme Reversion 5m paper trader (SOLUSDT, $1000 / 1x)
  # Phase 0 watcher: RSI(14)<10 LONG / >85 SHORT, exit RSI=50. Blacklist: 13-16h UTC + Tuesdays.
  # Data via asyncpg → jarvis_postgres (candle_collector el_candles_1m → resample 5m).
  # Stop with: docker compose stop trading-rsi-reversion-paper
  trading-rsi-reversion-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.rsi_reversion_paper
    container_name: trading_rsi_reversion_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8093:8093"
    environment:
      - TELEGRAM_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TRADING_ALLOWED_USERS:-}
      - RSI_SYMBOL=SOLUSDT
      - RSI_NOTIONAL=1000.0
      - RSI_FEE_RT=0.0013
      - RSI_PERIOD=14
      - RSI_OVERSOLD=10
      - RSI_OVERBOUGHT=85
      - RSI_EXIT_LEVEL=50
      - RSI_DB_HOST=172.18.0.2
      - RSI_DB_PORT=5432
      - RSI_DB_USER=jarvis
      - RSI_DB_PASS=${DB_PASS:-CHANGE_ME}
      - RSI_DB_NAME=jarvis
      - RSI_HEALTH_PORT=8093
      - RSI_DATA_DIR=/data
      - RSI_LOG_DIR=/logs
      - TZ=UTC
    volumes:
      - ./trading/rsi_reversion_paper/data:/data
      - ./trading/rsi_reversion_paper/logs:/logs
    networks:
      - trading_net
      - jarvis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # asian_dema_paper: R021-B Asian Session DEMA 1h paper trader (SOLUSDT, $1000 / 1x)
  # Phase 0 watcher: DEMA(13)/DEMA(34) crossover + slope filter, Asian hours 00-07h UTC.
  # Data via asyncpg → jarvis_postgres (candle_collector el_candles_1m).
  # Stop with: docker compose stop trading-asian-dema-paper
  trading-asian-dema-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.asian_dema_paper
    container_name: trading_asian_dema_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8095:8095"
    environment:
      - TELEGRAM_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TRADING_ALLOWED_USERS:-}
      - ADEMA_SYMBOL=SOLUSDT
      - ADEMA_NOTIONAL=1000.0
      - ADEMA_FEE_RT=0.0013
      - ADEMA_FAST=13
      - ADEMA_SLOW=34
      - ADEMA_SLOPE_BARS=3
      - ADEMA_DB_HOST=172.18.0.2
      - ADEMA_DB_PORT=5432
      - ADEMA_DB_USER=jarvis
      - ADEMA_DB_PASS=${DB_PASS:-CHANGE_ME}
      - ADEMA_DB_NAME=jarvis
      - ADEMA_HEALTH_PORT=8095
      - ADEMA_DATA_DIR=/data
      - ADEMA_LOG_DIR=/logs
      - TZ=UTC
    volumes:
      - ./trading/asian_dema_paper/data:/data
      - ./trading/asian_dema_paper/logs:/logs
    networks:
      - trading_net
      - jarvis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # sol_burst_paper: R012 SOL Extreme Burst Reversal 5m paper trader (SOLUSDT, $1000 / 1x)
  # Phase 0 watcher: |ret_5m|>2% → fade. TP=0.5% SL=0.25% Timeout=30m.
  # Data via asyncpg → jarvis_postgres (candle_collector el_candles_1m).
  # Stop with: docker compose stop trading-sol-burst-paper
  trading-sol-burst-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.sol_burst_paper
    container_name: trading_sol_burst_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8101:8101"
    environment:
      - TELEGRAM_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TRADING_ALLOWED_USERS:-}
      - BURST_SYMBOL=SOLUSDT
      - BURST_NOTIONAL=1000.0
      - BURST_FEE_RT_BPS=13.0
      - BURST_SIGNAL_THR=0.020
      - BURST_TP_FRAC=0.005
      - BURST_SL_FRAC=0.0025
      - BURST_TIMEOUT_BARS=6
      - BURST_DB_HOST=172.18.0.2
      - BURST_DB_PORT=5432
      - BURST_DB_USER=jarvis
      - BURST_DB_PASS=${DB_PASS:-CHANGE_ME}
      - BURST_DB_NAME=jarvis
      - BURST_HEALTH_PORT=8101
      - BURST_DATA_DIR=/data
      - BURST_LOG_DIR=/logs
      - TZ=UTC
    volumes:
      - ./trading/sol_burst_paper/data:/data
      - ./trading/sol_burst_paper/logs:/logs
    networks:
      - trading_net
      - jarvis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  trading-api:
    build:
      context: .
      dockerfile: trading/Dockerfile.api
    container_name: trading_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:8090"
    environment:
      # jarvis_postgres alias (jarvis_net) — unambiguous; avoids DNS conflict with trading_net's postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-jarvis}:${POSTGRES_PASSWORD:-CHANGE_ME}@jarvis_postgres:5432/${POSTGRES_DB:-jarvis}
      - DERIVATIVES_ENABLED=${DERIVATIVES_ENABLED:-true}
      - DERIVATIVES_FEATURE_ADAPTER_ENABLED=${DERIVATIVES_FEATURE_ADAPTER_ENABLED:-true}
      - ENGINE_DERIVATIVES_ADVISORY_ENABLED=${ENGINE_DERIVATIVES_ADVISORY_ENABLED:-true}
      - ENGINE_DERIVATIVES_HARD_FILTER_ENABLED=${ENGINE_DERIVATIVES_HARD_FILTER_ENABLED:-false}
      - DERIVATIVES_DATABASE_URL=${DERIVATIVES_DATABASE_URL:-}
      - REDIS_URL=redis://redis:6379
      - TRADING_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TRADING_ALLOWED_USERS=${TRADING_ALLOWED_USERS:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trading_net
      - jarvis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # swing_wf_paper — APOSENTADO 2026-07-04 (revalidação pós-fix do bug de shorts:
  # 1,4%/mês / Sharpe 0,59 / DD -38%, redundante com btc_lead_paper que domina a mesma
  # tese 4h). Código em trading/_archived/swing_wf_paper_archived_20260704/.

  # btc_lead_paper: SIGNAL_ONLY paper da vencedora rodada-2 do estudo single-asset
  # (02/07/2026): ETHUSDT 4h na direção do momentum do BTC (roc40 + ema100 do BTC),
  # L+S, config fixa, $1000 / 1x. Validado: PF 1.53, 4,9%/mês, DD -33%, MC p=0.013.
  # Data via Binance REST (no DB). Stop with: docker compose stop btc-lead-paper
  btc-lead-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.btc_lead_paper
    container_name: trading_btc_lead_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8106:8106"
    environment:
      - TELEGRAM_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TRADING_ALLOWED_USERS:-}
      - BLP_TELEGRAM_TAG=BTCLEAD
      - BLP_TRADE_SYMBOL=ETHUSDT
      - BLP_SIGNAL_SYMBOL=BTCUSDT
      - BLP_ROC_N=40
      - BLP_EMA_N=100
      - BLP_ALLOW_SHORT=true
      - BLP_CAPITAL=1000.0
      - BLP_LEVERAGE=1.0
      - BLP_FEE_BPS=4.0
      - BLP_SLIP_BPS=2.0
      - BLP_FUNDING=true
      - BLP_HEALTH_PORT=8106
      - BLP_DATA_DIR=/data
      - BLP_LOG_DIR=/logs
      - TZ=UTC
    volumes:
      - ./trading/btc_lead_paper/data:/data
      - ./trading/btc_lead_paper/logs:/logs
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8106/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


  # taker_cap_paper: SIGNAL_ONLY paper do H3 da fase 2 do liqflow study
  # (03/07/2026): LONG 4h após capitulação de taker (z(taker LSR 24h, 7d) < -2),
  # BTC/ETH/SOL 1h, long-only, hold fixo 4 barras, $1000 (3×$333) / 1x.
  # Validado 3,5 anos: +17,6bps/trade t=2,8, 4/4 anos+, corr 0 c/ ensemble.
  # Data via Binance REST (no DB). Stop with: docker compose stop taker-cap-paper
  taker-cap-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.taker_cap_paper
    container_name: trading_taker_cap_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8107:8107"
    environment:
      - TELEGRAM_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TRADING_ALLOWED_USERS:-}
      - TCP_TELEGRAM_TAG=TAKERCAP
      - TCP_SYMBOLS=BTCUSDT,ETHUSDT,SOLUSDT
      - TCP_Z_TH=-2.0
      - TCP_HOLD_BARS=4
      - TCP_CAPITAL=1000.0
      - TCP_LEVERAGE=1.0
      - TCP_FEE_BPS=4.0
      - TCP_SLIP_BPS=2.0
      - TCP_FUNDING=true
      - TCP_HEALTH_PORT=8107
      - TCP_DATA_DIR=/data
      - TCP_LOG_DIR=/logs
      - TZ=UTC
    volumes:
      - ./trading/taker_cap_paper/data:/data
      - ./trading/taker_cap_paper/logs:/logs
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8107/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


  # vrp_paper: short-vol semanal Deribit (paper) — vende straddle ATM sexta 08:05 UTC
  # (vencimento sexta seguinte) no best bid real, hedge de delta diário via perp paper,
  # settle no delivery price oficial. Validado pós-fix: 2,56%/mês, PFtrade 1.80,
  # Sharpe 1.73, maxDD -17,9% @1x (2022-26). Ver research/options_study/REPORT.md.
  vrp-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.vrp_paper
    container_name: trading_vrp_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8108:8108"
    environment:
      - TELEGRAM_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TRADING_ALLOWED_USERS:-}
      - VRP_TELEGRAM_TAG=VRP
      - VRP_CAPITAL=1000.0
      - VRP_SIZE_MULT=1.0
      - VRP_HEALTH_PORT=8108
      - VRP_DATA_DIR=/data
      - VRP_LOG_DIR=/logs
      - TZ=UTC
    volumes:
      - ./trading/vrp_paper/data:/data
      - ./trading/vrp_paper/logs:/logs
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8108/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


volumes:
  pgdata:

networks:
  trading_net:
    name: trading_net
    driver: bridge
  jarvis_net:
    name: jarvis_net
    external: true
