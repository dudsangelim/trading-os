services:

  postgres:
    image: postgres:16
    container_name: trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jarvis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
      POSTGRES_DB: ${POSTGRES_DB:-jarvis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - trading_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trading_redis
    restart: unless-stopped
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  trading-worker:
    build:
      context: .
      dockerfile: trading/Dockerfile.worker
    container_name: trading_worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-jarvis}:${POSTGRES_PASSWORD:-CHANGE_ME}@jarvis_postgres:5432/${POSTGRES_DB:-jarvis}
      - DERIVATIVES_ENABLED=${DERIVATIVES_ENABLED:-true}
      - DERIVATIVES_FEATURE_ADAPTER_ENABLED=${DERIVATIVES_FEATURE_ADAPTER_ENABLED:-true}
      - ENGINE_DERIVATIVES_ADVISORY_ENABLED=${ENGINE_DERIVATIVES_ADVISORY_ENABLED:-true}
      - ENGINE_DERIVATIVES_HARD_FILTER_ENABLED=${ENGINE_DERIVATIVES_HARD_FILTER_ENABLED:-false}
      - DERIVATIVES_DATABASE_URL=${DERIVATIVES_DATABASE_URL:-}
      - REDIS_URL=redis://redis:6379
      - TRADING_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TRADING_ALLOWED_USERS=${TRADING_ALLOWED_USERS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trading_net
      - jarvis_net
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  trading-overlay-worker:
    build:
      context: .
      dockerfile: trading/Dockerfile.worker
    container_name: trading_overlay_worker
    restart: unless-stopped
    command: ["python", "-m", "trading.apps.overlay_worker.main"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-jarvis}:${POSTGRES_PASSWORD:-CHANGE_ME}@jarvis_postgres:5432/${POSTGRES_DB:-jarvis}
      - REDIS_URL=redis://redis:6379
      - TRADING_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TRADING_ALLOWED_USERS=${TRADING_ALLOWED_USERS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      trading-worker:
        condition: service_started
    networks:
      - trading_net
      - jarvis_net
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # carry_worker: autonomous 5-min loop for carry_neutral_btc (delta-neutral funding)
  # Disabled by default via CARRY_NEUTRAL_ENABLED=false — enable to start paper trading
  trading-carry-worker:
    build:
      context: .
      dockerfile: trading/Dockerfile.worker
    container_name: trading_carry_worker
    restart: unless-stopped
    command: ["python", "-m", "trading.apps.carry_worker.main"]
    environment:
      # jarvis_postgres alias (jarvis_net) — unambiguous; avoids DNS conflict with trading_net's postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-jarvis}:${POSTGRES_PASSWORD:-CHANGE_ME}@jarvis_postgres:5432/${POSTGRES_DB:-jarvis}
      - DERIVATIVES_ENABLED=${DERIVATIVES_ENABLED:-true}
      - DERIVATIVES_FEATURE_ADAPTER_ENABLED=${DERIVATIVES_FEATURE_ADAPTER_ENABLED:-true}
      - DERIVATIVES_DATABASE_URL=${DERIVATIVES_DATABASE_URL:-}
      - CARRY_NEUTRAL_ENABLED=${CARRY_NEUTRAL_ENABLED:-false}
      - CARRY_NEUTRAL_VARIANT=${CARRY_NEUTRAL_VARIANT:-sell_accrual}
      - CARRY_NEUTRAL_STAKE_USD=${CARRY_NEUTRAL_STAKE_USD:-300}
      - TRADING_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TRADING_ALLOWED_USERS=${TRADING_ALLOWED_USERS:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trading_net
      - jarvis_net
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ny_open_paper: standalone 2C fade NY Open paper trader (BTCUSDT 5m, $100/1x)
  # Fully isolated: no postgres, no redis, no registry entry.
  # Stop with: docker compose stop trading-ny-open-paper
  trading-ny-open-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.ny_open_paper
    container_name: trading_ny_open_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8094:8094"
    environment:
      - TRADING_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TRADING_ALLOWED_USERS=${TRADING_ALLOWED_USERS:-}
      - NY_OPEN_DATA_DIR=/data
      - NY_OPEN_LOG_DIR=/logs
      - NY_OPEN_HEALTH_PORT=8094
    volumes:
      - ./trading/ny_open_paper/data:/data
      - ./trading/ny_open_paper/logs:/logs
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # dow_3legs_paper: standalone DOW 3-legs skip_low paper trader (BTCUSDT, $50/1.0x)
  # Fully isolated: no postgres, no redis, no registry entry.
  # Stop with: docker compose stop trading-dow-3legs-paper
  trading-dow-3legs-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.dow_3legs_paper
    container_name: trading_dow_3legs_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8096:8096"
    environment:
      - TELEGRAM_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TRADING_ALLOWED_USERS:-}
      - TELEGRAM_TAG=DOW3L
      - DOW_OUTDIR=/data
      - DOW_LOG_DIR=/logs
      - DOW_CAPITAL=50.0
      - DOW_LEVERAGE=1.0
      - DOW_HEALTH_PORT=8096
      - DOW_DISABLE_GATE=false
      - TZ=UTC
    volumes:
      - ./trading/dow_3legs_paper/data:/data
      - ./trading/dow_3legs_paper/logs:/logs
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ef3_fa1mf_paper: Edge Factory v3 R003 / F-A.1.M.f paper trader (BTCUSDT, $1000 / 1x)
  # 30-bar H4 CLOSE breakout + SMA200 Daily regime filter + ATR14x2.0 trailing stop.
  # Data via Binance Futures public REST klines (H4 + Daily). Long-only, isolated.
  # Stop with: docker compose stop trading-ef3-fa1mf-paper
  trading-ef3-fa1mf-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.ef3_fa1mf_paper
    container_name: trading_ef3_fa1mf_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8102:8102"
    environment:
      - FA1MF_DATA_DIR=/data
      - FA1MF_LOG_DIR=/logs
      - FA1MF_CAPITAL=1000.0
      - FA1MF_LEVERAGE=1.0
      - FA1MF_HEALTH_PORT=8102
      - TZ=UTC
    volumes:
      - ./trading/ef3_fa1mf_paper/data:/data
      - ./trading/ef3_fa1mf_paper/logs:/logs
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8102/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ef3_fb2af_paper: Edge Factory v3 R004 / F-B.2.A.f paper trader (BTCUSDT, $1000 / 1x)
  # 20-bar H4 HIGH breakout + range-compression <12% + SMA200 Daily + SL 1xATR14 + TP 8:1.
  # Data via Binance Futures public REST klines (H4 + Daily). Long-only, isolated.
  # Stop with: docker compose stop trading-ef3-fb2af-paper
  trading-ef3-fb2af-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.ef3_fb2af_paper
    container_name: trading_ef3_fb2af_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8103:8103"
    environment:
      - FB2AF_DATA_DIR=/data
      - FB2AF_LOG_DIR=/logs
      - FB2AF_CAPITAL=1000.0
      - FB2AF_LEVERAGE=1.0
      - FB2AF_HEALTH_PORT=8103
      - TZ=UTC
    volumes:
      - ./trading/ef3_fb2af_paper/data:/data
      - ./trading/ef3_fb2af_paper/logs:/logs
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8103/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # rsi_reversion_paper: R021-A C1 RSI Extreme Reversion 5m paper trader (SOLUSDT, $1000 / 1x)
  # Phase 0 watcher: RSI(14)<10 LONG / >85 SHORT, exit RSI=50. Blacklist: 13-16h UTC + Tuesdays.
  # Data via asyncpg → jarvis_postgres (candle_collector el_candles_1m → resample 5m).
  # Stop with: docker compose stop trading-rsi-reversion-paper
  trading-rsi-reversion-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.rsi_reversion_paper
    container_name: trading_rsi_reversion_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8093:8093"
    environment:
      - TELEGRAM_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TRADING_ALLOWED_USERS:-}
      - RSI_SYMBOL=SOLUSDT
      - RSI_NOTIONAL=1000.0
      - RSI_FEE_RT=0.0013
      - RSI_PERIOD=14
      - RSI_OVERSOLD=10
      - RSI_OVERBOUGHT=85
      - RSI_EXIT_LEVEL=50
      - RSI_DB_HOST=172.18.0.2
      - RSI_DB_PORT=5432
      - RSI_DB_USER=jarvis
      - RSI_DB_PASS=${DB_PASS:-CHANGE_ME}
      - RSI_DB_NAME=jarvis
      - RSI_HEALTH_PORT=8093
      - RSI_DATA_DIR=/data
      - RSI_LOG_DIR=/logs
      - TZ=UTC
    volumes:
      - ./trading/rsi_reversion_paper/data:/data
      - ./trading/rsi_reversion_paper/logs:/logs
    networks:
      - trading_net
      - jarvis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # asian_dema_paper: R021-B Asian Session DEMA 1h paper trader (SOLUSDT, $1000 / 1x)
  # Phase 0 watcher: DEMA(13)/DEMA(34) crossover + slope filter, Asian hours 00-07h UTC.
  # Data via asyncpg → jarvis_postgres (candle_collector el_candles_1m).
  # Stop with: docker compose stop trading-asian-dema-paper
  trading-asian-dema-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.asian_dema_paper
    container_name: trading_asian_dema_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8095:8095"
    environment:
      - TELEGRAM_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TRADING_ALLOWED_USERS:-}
      - ADEMA_SYMBOL=SOLUSDT
      - ADEMA_NOTIONAL=1000.0
      - ADEMA_FEE_RT=0.0013
      - ADEMA_FAST=13
      - ADEMA_SLOW=34
      - ADEMA_SLOPE_BARS=3
      - ADEMA_DB_HOST=172.18.0.2
      - ADEMA_DB_PORT=5432
      - ADEMA_DB_USER=jarvis
      - ADEMA_DB_PASS=${DB_PASS:-CHANGE_ME}
      - ADEMA_DB_NAME=jarvis
      - ADEMA_HEALTH_PORT=8095
      - ADEMA_DATA_DIR=/data
      - ADEMA_LOG_DIR=/logs
      - TZ=UTC
    volumes:
      - ./trading/asian_dema_paper/data:/data
      - ./trading/asian_dema_paper/logs:/logs
    networks:
      - trading_net
      - jarvis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # sol_burst_paper: R012 SOL Extreme Burst Reversal 5m paper trader (SOLUSDT, $1000 / 1x)
  # Phase 0 watcher: |ret_5m|>2% → fade. TP=0.5% SL=0.25% Timeout=30m.
  # Data via asyncpg → jarvis_postgres (candle_collector el_candles_1m).
  # Stop with: docker compose stop trading-sol-burst-paper
  trading-sol-burst-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.sol_burst_paper
    container_name: trading_sol_burst_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8101:8101"
    environment:
      - TELEGRAM_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TRADING_ALLOWED_USERS:-}
      - BURST_SYMBOL=SOLUSDT
      - BURST_NOTIONAL=1000.0
      - BURST_FEE_RT_BPS=13.0
      - BURST_SIGNAL_THR=0.020
      - BURST_TP_FRAC=0.005
      - BURST_SL_FRAC=0.0025
      - BURST_TIMEOUT_BARS=6
      - BURST_DB_HOST=172.18.0.2
      - BURST_DB_PORT=5432
      - BURST_DB_USER=jarvis
      - BURST_DB_PASS=${DB_PASS:-CHANGE_ME}
      - BURST_DB_NAME=jarvis
      - BURST_HEALTH_PORT=8101
      - BURST_DATA_DIR=/data
      - BURST_LOG_DIR=/logs
      - TZ=UTC
    volumes:
      - ./trading/sol_burst_paper/data:/data
      - ./trading/sol_burst_paper/logs:/logs
    networks:
      - trading_net
      - jarvis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ny_open_mom_paper: NY Open Momentum Long Phase 0 (BTCUSDT, $1000/1x)
  # Signal: upside break with os_close >= 0.10%. Entry LONG at range high on retest.
  # Phase 0 gate: WR < 40% after 50 trades → HALT.
  # Stop with: docker compose stop trading-ny-open-mom-paper
  trading-ny-open-mom-paper:
    build:
      context: .
      dockerfile: trading/Dockerfile.ny_open_mom_paper
    container_name: trading_ny_open_mom_paper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8104:8104"
    environment:
      - TELEGRAM_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TRADING_ALLOWED_USERS:-}
      - TELEGRAM_TAG=NYOM
      - NYOM_SYMBOL=BTCUSDT
      - NYOM_STRATEGY_ID=ny_open_mom_btc_long_v1
      - NYOM_CAPITAL=1000.0
      - NYOM_LEVERAGE=4.0
      - NYOM_OS_THR_PCT=0.10
      - NYOM_SL_MULT=1.5
      - NYOM_TP_MULT=1.0
      - NYOM_STOP_ALPHA=0.40
      - NYOM_STOP_MIN_PCT=0.003
      - NYOM_STOP_MAX_PCT=0.008
      - NYOM_BREAK_BUFFER=0.0005
      - NYOM_MAX_RETEST_MIN=15
      - NYOM_PHASE0_MIN_TRADES=50
      - NYOM_PHASE0_WR_FLOOR=0.40
      - NYOM_HEALTH_PORT=8104
      - NYOM_DATA_DIR=/data
      - NYOM_LOG_DIR=/logs
      - TZ=UTC
    volumes:
      - ./trading/ny_open_mom_paper/data:/data
      - ./trading/ny_open_mom_paper/logs:/logs
    networks:
      - trading_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8104/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  trading-api:
    build:
      context: .
      dockerfile: trading/Dockerfile.api
    container_name: trading_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:8090"
    environment:
      # jarvis_postgres alias (jarvis_net) — unambiguous; avoids DNS conflict with trading_net's postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-jarvis}:${POSTGRES_PASSWORD:-CHANGE_ME}@jarvis_postgres:5432/${POSTGRES_DB:-jarvis}
      - DERIVATIVES_ENABLED=${DERIVATIVES_ENABLED:-true}
      - DERIVATIVES_FEATURE_ADAPTER_ENABLED=${DERIVATIVES_FEATURE_ADAPTER_ENABLED:-true}
      - ENGINE_DERIVATIVES_ADVISORY_ENABLED=${ENGINE_DERIVATIVES_ADVISORY_ENABLED:-true}
      - ENGINE_DERIVATIVES_HARD_FILTER_ENABLED=${ENGINE_DERIVATIVES_HARD_FILTER_ENABLED:-false}
      - DERIVATIVES_DATABASE_URL=${DERIVATIVES_DATABASE_URL:-}
      - REDIS_URL=redis://redis:6379
      - TRADING_BOT_TOKEN=${TRADING_BOT_TOKEN:-}
      - TRADING_ALLOWED_USERS=${TRADING_ALLOWED_USERS:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trading_net
      - jarvis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s


volumes:
  pgdata:

networks:
  trading_net:
    name: trading_net
    driver: bridge
  jarvis_net:
    name: jarvis_net
    external: true
